
# Firebase App Hosting configuration for Next.js SSR
# Docs: https://firebase.google.com/docs/app-hosting

runConfig:
  # Keep one instance warm so the first request after deploy/inactivity does not
  # pay a full Next.js server cold start.
  minInstances: 1
  maxInstances: 2
  cpu: 1
  memoryMiB: 1024
  concurrency: 80

build:
  run: |
    npm i && npm run build

start:
  run: npm run start

