# Preview deploys for PRs (same auth pattern as deploy.yml).

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDIO_1273073612_71183 }}

      - name: Install dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ENABLE_DEV_LOGIN: 'false'
          NODE_ENV: production

      - name: Deploy preview channel
        run: |
          npx firebase-tools@14.27.0 hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" \
            --project studio-1273073612-71183 \
            --non-interactive \
            --expires 7d
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
