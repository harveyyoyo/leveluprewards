name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  # Needed to upload firebase-debug.log when deploy fails.
  actions: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Required for firebase.json hosting.source (Next.js Web Frameworks integration).
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Use Application Default Credentials (same JSON secret as before). Avoids
      # FirebaseExtended/action-hosting-deploy swallowing real errors behind --json parsing.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDIO_1273073612_71183 }}

      - name: Install dependencies
        run: npm ci

      - name: Create production runtime env
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          {
            if [ -n "$OPENAI_API_KEY" ]; then
              printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            fi
            if [ -n "$GEMINI_API_KEY" ]; then
              printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY"
            fi
            printf 'NEXT_PUBLIC_ENABLE_DEV_LOGIN=false\n'
            # Session cookies still 503 on SSR; keep middleware gate off until Admin ADC is fixed.
            printf 'DISABLE_AUTH_SESSION_EDGE=1\n'
            printf 'OFFICE_CANONICAL_HOST=office.leveluprewards.app\n'
            printf 'NEXT_PUBLIC_OFFICE_CANONICAL_HOST=office.leveluprewards.app\n'
            printf 'AUTH_COOKIE_DOMAIN=.leveluprewards.app\n'
          } > .env

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ENABLE_DEV_LOGIN: 'false'
          NODE_ENV: production

      # Next.js + firebase.json "hosting.source" uses Web Frameworks (SSR → Cloud Functions).
      # If deploy fails with IAM errors, grant the CI service account "Service Account User" on the
      # default compute SA: <PROJECT_NUMBER>-compute@developer.gserviceaccount.com (see Firebase docs).
      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set -o pipefail
          npx firebase-tools@14.27.0 deploy \
            --only hosting \
            --project studio-1273073612-71183 \
            --non-interactive \
            --force 2>&1 | tee firebase-debug.log
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Install Playwright browser for live auth smoke
        run: npx playwright install --with-deps chromium

      - name: Run live uptime check against production
        run: npm run test:live-uptime
        env:
          LIVE_UPTIME_BASE_URL: https://levelupenterprises.education
          LIVE_UPTIME_SCHOOL_ID: yeshiva
          LIVE_UPTIME_PORTAL_MODE: any

      - name: Run live auth smoke against production
        run: npm run test:live-auth
        env:
          LIVE_AUTH_BASE_URL: https://levelupenterprises.education
          LIVE_AUTH_SCHOOL_ID: yeshiva
          LIVE_AUTH_PASSCODE: ${{ secrets.LIVE_AUTH_PASSCODE || '1234' }}

      - name: Upload Firebase CLI debug log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-debug-log
          path: |
            firebase-debug.log
            .firebase/*.log
          if-no-files-found: ignore
