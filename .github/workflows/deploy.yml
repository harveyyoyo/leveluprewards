name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Required for firebase.json hosting.source (Next.js Web Frameworks integration).
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Use Application Default Credentials (same JSON secret as before). Avoids
      # FirebaseExtended/action-hosting-deploy swallowing real errors behind --json parsing.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDIO_1273073612_71183 }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ENABLE_DEV_LOGIN: 'false'
          NODE_ENV: production

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@14.27.0 deploy --only hosting --project studio-1273073612-71183 --non-interactive --force
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
